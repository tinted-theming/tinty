[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[licenses]
# We want really high confidence when inferring licenses from text
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",          # rustls-webpki, aws-lc-rs
    "MIT",
    "MIT-0",        # aws-lc-sys
    "MPL-2.0",
    "Unicode-3.0",
    "GPL-3.0-only",
    "Zlib",
]
exceptions = [
    { allow = [
        "MPL-2.0",
    ], name = "option-ext" },
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = [
    # Principled bans — keep C TLS / SSH crypto out of the dep tree.
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "libssh2-sys" },

    # Keep the binary lean.
    { name = "windows" },

    # `cmake` was banned here previously. `gix 0.83`'s HTTPS feature pulls
    # `aws-lc-rs` (→ `aws-lc-sys` → `cmake` build-dep); until gitoxide ships a
    # `-rust-tls-ring` variant, we accept the cmake build-time dependency.
]
skip = [
    { name = "thiserror" },
    { name = "thiserror-impl" },
    { name = "nom" },
    # Introduced by the gix 0.83 dep tree.
    { name = "getrandom" },
    { name = "hashbrown" },
]


[sources]
unknown-registry = "deny"
unknown-git = "deny"

[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste crate is unmaintained
]
