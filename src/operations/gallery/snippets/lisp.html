<span class="comment">;; load and apply a color scheme</span>
(<span class="function">defpackage</span> <span class="punctuation">:</span><span class="string">tinty</span> (<span class="punctuation">:</span><span class="string">use</span> <span class="punctuation">:</span><span class="string">cl</span>))

(<span class="macro">defun</span> <span class="function">apply-scheme</span> (name)
  (<span class="function">let*</span> ((scheme (<span class="namespace">scheme</span><span class="punctuation">:</span>load name))
         (theme (<span class="namespace">scheme</span><span class="punctuation">:</span>build scheme <span class="punctuation">:</span><span class="string">base</span> <span class="number">16</span>)))
    (<span class="namespace">theme</span><span class="punctuation">:</span>apply theme)
    (<span class="function">format</span> <span class="number">t</span> <span class="string">"applied:</span> <span class="escape">~a~%</span><span class="string">"</span>
      (<span class="namespace">theme</span><span class="punctuation">:</span>name theme))))
